name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[deploy]')

    steps:
      - name: Deploy to Lighthouse via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          command_timeout: 60m
          script: |
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            cd "${DEPLOY_PATH:-/opt/md2red}"

            # Pull latest code
            git fetch origin main
            git reset --hard origin/main

            # Rebuild (use --no-cache when Dockerfile changed significantly)
            CACHE_BUST=$(date +%s) docker compose build --no-cache

            # Restart
            docker compose down && docker compose up -d

            # Verify
            sleep 3
            docker compose exec md2red wget -qO- http://localhost:3001/api/console-auth || echo "Health check failed"
            echo "Deploy complete: $(date)"
