<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1440px;
    font-family: 'Noto Sans SC', 'PingFang SC', 'Helvetica Neue', sans-serif;
    background: {{backgroundColor}};
    color: {{textColor}};
    display: flex;
    flex-direction: column;
    padding: 80px;
    position: relative;
  }
  .page-num {
    position: absolute;
    top: 40px;
    right: 60px;
    font-size: 22px;
    opacity: 0.3;
  }
  .heading {
    font-size: 44px;
    font-weight: 700;
    margin-bottom: 36px;
    color: {{titleColor}};
  }
  .description {
    font-size: 30px;
    line-height: 1.6;
    margin-bottom: 36px;
    opacity: 0.85;
  }
  .code-container {
    border-radius: 16px;
    flex: 1;
    overflow: hidden;
    position: relative;
  }
  .code-lang {
    position: absolute;
    top: 16px;
    right: 24px;
    font-size: 20px;
    color: #888;
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    z-index: 1;
  }
  .code-container pre {
    padding: 40px !important;
    border-radius: 16px !important;
    font-size: 24px !important;
    line-height: 1.6 !important;
    height: 100% !important;
    overflow: hidden !important;
    font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', monospace !important;
  }
  .code-container pre code {
    font-family: inherit !important;
  }
  .footer {
    position: absolute;
    bottom: 40px;
    right: 60px;
    font-size: 20px;
    opacity: 0.3;
  }
</style>
</head>
<body>
  <div class="page-num">{{pageNum}}</div>
  <div class="heading">{{heading}}</div>
  <div class="description">{{description}}</div>
  <div class="code-container">
    <div class="code-lang">{{language}}</div>
    {{codeHtml}}
  </div>
  <div class="footer">AI 辅助生成</div>
</body>
</html>
