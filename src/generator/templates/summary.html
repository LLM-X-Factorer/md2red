<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1440px;
    font-family: 'Noto Sans SC', 'PingFang SC', 'Helvetica Neue', sans-serif;
    background: {{backgroundColor}};
    color: {{textColor}};
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 80px;
    text-align: center;
    position: relative;
  }
  .heading {
    font-size: 52px;
    font-weight: 700;
    margin-bottom: 60px;
    color: {{titleColor}};
  }
  .points {
    text-align: left;
    max-width: 800px;
    margin-bottom: 80px;
  }
  .point {
    font-size: 34px;
    line-height: 1.7;
    margin-bottom: 28px;
    padding-left: 40px;
    position: relative;
  }
  .point::before {
    content: '✦';
    position: absolute;
    left: 0;
    color: {{accentColor}};
  }
  .cta {
    font-size: 36px;
    opacity: 0.7;
    margin-top: 20px;
  }
  .footer {
    position: absolute;
    bottom: 40px;
    font-size: 20px;
    opacity: 0.4;
  }
</style>
</head>
<body>
  <div class="heading">{{heading}}</div>
  <div class="points">{{pointsHtml}}</div>
  <div class="cta">{{cta}}</div>
  <div class="footer">AI 辅助生成</div>
</body>
</html>
