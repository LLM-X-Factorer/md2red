<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1440px;
    font-family: 'Noto Sans SC', 'PingFang SC', 'Helvetica Neue', sans-serif;
    background: {{backgroundColor}};
    color: {{textColor}};
    display: flex;
    flex-direction: column;
    padding: 80px 80px 60px;
    position: relative;
  }
  .page-num {
    position: absolute;
    top: 40px;
    right: 60px;
    font-size: 22px;
    opacity: 0.3;
  }
  .heading {
    font-size: 48px;
    font-weight: 700;
    margin-bottom: 44px;
    line-height: 1.3;
    color: {{titleColor}};
    border-left: 6px solid {{accentColor}};
    padding-left: 24px;
  }
  .body-text {
    font-size: 32px;
    line-height: 1.9;
    flex: 1;
    overflow: hidden;
  }
  .body-text p {
    margin-bottom: 20px;
    text-align: justify;
  }
  .body-text ul, .body-text ol {
    margin-left: 40px;
    margin-bottom: 20px;
  }
  .body-text li {
    margin-bottom: 10px;
  }
  .body-text strong {
    color: {{titleColor}};
  }
  .highlight-box {
    background: rgba(99, 102, 241, 0.08);
    border-radius: 12px;
    padding: 24px 28px;
    margin: 20px 0;
  }
  .footer {
    position: absolute;
    bottom: 40px;
    right: 60px;
    font-size: 20px;
    opacity: 0.3;
  }
</style>
</head>
<body>
  <div class="page-num">{{pageNum}}</div>
  <div class="heading">{{heading}}</div>
  <div class="body-text">{{bodyHtml}}</div>
  <div class="footer">AI 辅助生成</div>
</body>
</html>
