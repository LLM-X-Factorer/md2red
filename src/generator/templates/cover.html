<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1440px;
    font-family: 'Noto Sans SC', 'PingFang SC', 'Helvetica Neue', sans-serif;
    background: {{backgroundColor}};
    color: {{textColor}};
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 80px;
    position: relative;
    overflow: hidden;
  }
  .decoration {
    position: absolute;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: {{accentColor}};
    opacity: 0.1;
  }
  .deco-1 { top: -100px; right: -100px; }
  .deco-2 { bottom: -150px; left: -100px; width: 500px; height: 500px; }
  .content {
    position: relative;
    z-index: 1;
    text-align: center;
    max-width: 900px;
  }
  .title {
    font-size: 72px;
    font-weight: 800;
    line-height: 1.3;
    margin-bottom: 40px;
    color: {{titleColor}};
  }
  .subtitle {
    font-size: 36px;
    font-weight: 400;
    line-height: 1.6;
    opacity: 0.8;
  }
  .tag {
    display: inline-block;
    margin: 8px;
    padding: 12px 28px;
    border-radius: 24px;
    font-size: 24px;
    background: {{accentColor}};
    color: #fff;
    opacity: 0.9;
  }
  .tags {
    margin-top: 60px;
  }
  .footer {
    position: absolute;
    bottom: 40px;
    font-size: 20px;
    opacity: 0.4;
  }
</style>
</head>
<body>
  <div class="decoration deco-1"></div>
  <div class="decoration deco-2"></div>
  <div class="content">
    <div class="title">{{title}}</div>
    <div class="subtitle">{{subtitle}}</div>
    <div class="tags">{{tags}}</div>
  </div>
  <div class="footer">AI 辅助生成</div>
</body>
</html>
