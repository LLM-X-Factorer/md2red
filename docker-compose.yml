services:
  md2red:
    build:
      context: .
      args:
        CACHE_BUST: ${CACHE_BUST:-1}
    volumes:
      - md2red-data:/data
      - ./articles:/articles
      - ./output:/output
    ports:
      - "3001:3001"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - MD2RED_PASSWORD=${MD2RED_PASSWORD:-}
    restart: unless-stopped

volumes:
  md2red-data:
